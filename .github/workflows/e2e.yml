name: E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  api-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: quantflow
          POSTGRES_PASSWORD: quantflow
          POSTGRES_DB: quantflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quantflow -d quantflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @quantflow/api build
      - run: pnpm --filter @quantflow/web build
        env:
          NEXT_PROXY_API: "true"
          API_PROXY_TARGET: http://127.0.0.1:3002
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3000
      - name: Start API and Web
        env:
          NODE_ENV: test
          PORT: 3002
          ENABLE_E2E_AUTH: "true"
          DATABASE_URL: postgresql://quantflow:quantflow@localhost:5432/quantflow
          NEXT_PROXY_API: "true"
          API_PROXY_TARGET: http://127.0.0.1:3002
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3000
        run: |
          pnpm --filter @quantflow/api db:deploy
          pnpm --filter @quantflow/api start &
          pnpm --filter @quantflow/web start &
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:3002/api/v1/health/ready >/dev/null \
              && curl -fsS http://127.0.0.1:3000/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API/Web failed to become ready" >&2
          exit 1
      - run: ./scripts/check-performance-budget.sh
        env:
          PERF_BASE_URL: http://127.0.0.1:3002
      - run: ./scripts/check-acceptance-p0.sh
        env:
          ACCEPTANCE_API_URL: http://127.0.0.1:3002
      - run: pnpm exec playwright install chromium
        timeout-minutes: 6
        working-directory: packages/e2e
      - run: >-
          pnpm exec playwright test
          api-smoke user-journey user-journey-web paper-journey marketing
          mvp-acceptance invite-journey
        timeout-minutes: 8
        working-directory: packages/e2e
        env:
          E2E_API_URL: http://127.0.0.1:3002
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_WEB_URL: http://127.0.0.1:3000
