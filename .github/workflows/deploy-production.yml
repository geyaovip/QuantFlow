name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: quantflow-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Set image registry
        run: |
          echo "IMAGE_REGISTRY=ghcr.io/${{ github.repository_owner }}/quantflow" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --file deploy/Dockerfile.release \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag "$IMAGE_REGISTRY/app:$IMAGE_TAG" \
            --push \
            .

      - name: Install SSH key
        env:
          DEPLOY_KEY: ${{ secrets.QUANTFLOW_DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ vars.QUANTFLOW_DEPLOY_HOST }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/quantflow_deploy
          chmod 600 ~/.ssh/quantflow_deploy
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync release to VPS
        env:
          DEPLOY_HOST: ${{ vars.QUANTFLOW_DEPLOY_HOST }}
          DEPLOY_PATH: ${{ vars.QUANTFLOW_DEPLOY_PATH }}
          DEPLOY_USER: ${{ vars.QUANTFLOW_DEPLOY_USER }}
        run: |
          rsync -az --delete \
            --exclude .git \
            --exclude .env \
            --exclude node_modules \
            --exclude '**/.next' \
            --exclude '**/dist' \
            -e 'ssh -i ~/.ssh/quantflow_deploy -o IdentitiesOnly=yes' \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Configure runtime payment env
        env:
          DEPLOY_HOST: ${{ vars.QUANTFLOW_DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.QUANTFLOW_DEPLOY_USER }}
          PLISIO_API_KEY: ${{ secrets.PLISIO_API_KEY }}
        run: |
          if [ -z "$PLISIO_API_KEY" ]; then
            echo "missing production secret: PLISIO_API_KEY" >&2
            exit 1
          fi

          ssh -i ~/.ssh/quantflow_deploy -o IdentitiesOnly=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "PLISIO_API_KEY=$(printf '%q' "$PLISIO_API_KEY") sh -s" <<'REMOTE'
          set -eu

          ENV_FILE=/home/ubuntu/apps/quantflow/shared/.env
          if [ ! -f "$ENV_FILE" ]; then
            echo "missing production environment file: $ENV_FILE" >&2
            exit 1
          fi

          upsert_env() {
            key=$1
            value=$2
            escaped=$(printf '%s' "$value" | sed 's/[&|]/\\&/g')
            if grep -q "^$key=" "$ENV_FILE"; then
              sed -i "s|^$key=.*|$key=$escaped|" "$ENV_FILE"
            else
              printf '%s=%s\n' "$key" "$value" >> "$ENV_FILE"
            fi
          }

          upsert_env ENABLE_PRODUCTION_PAYMENTS true
          upsert_env PLISIO_API_KEY "$PLISIO_API_KEY"
          upsert_env PUBLIC_WEB_URL https://quantflow.chat
          upsert_env PUBLIC_API_URL https://api.quantflow.chat
          chmod 600 "$ENV_FILE"
          REMOTE

      - name: Build and deploy
        env:
          DEPLOY_HOST: ${{ vars.QUANTFLOW_DEPLOY_HOST }}
          DEPLOY_PATH: ${{ vars.QUANTFLOW_DEPLOY_PATH }}
          DEPLOY_USER: ${{ vars.QUANTFLOW_DEPLOY_USER }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_USERNAME: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/quantflow_deploy -o IdentitiesOnly=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && chmod +x scripts/deploy-production.sh && QUANTFLOW_IMAGE_TAG='$IMAGE_TAG' QUANTFLOW_IMAGE_REGISTRY='${IMAGE_REGISTRY}' QUANTFLOW_BUILD_ON_VPS='false' QUANTFLOW_GHCR_USERNAME='$GHCR_USERNAME' QUANTFLOW_GHCR_TOKEN='$GHCR_TOKEN' scripts/deploy-production.sh"

      - name: Verify public endpoints
        env:
          DEPLOY_HOST: ${{ vars.QUANTFLOW_DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.QUANTFLOW_DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/quantflow_deploy -o IdentitiesOnly=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "curl --fail --retry 12 --retry-delay 5 --retry-all-errors http://127.0.0.1:3100 && curl --fail --retry 12 --retry-delay 5 --retry-all-errors http://127.0.0.1:3101/admin && curl --fail --retry 12 --retry-delay 5 --retry-all-errors http://127.0.0.1:3102/api/v1/health"
